<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POKEBATTLES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --bg: #0a0a1a; --bg2: #0d0d22; --panel: #111130; --panel2: #0e0e28;
  --accent: #e94560; --accent2: #ff6b9d; --gold: #f5a623; --blue: #4488ff;
  --green: #00e676; --purple: #a855f7; --text: #eaeaea; --dim: #6677aa;
  --border: #1a2050; --border2: #242860; --hp-green: #4ade80;
  --hp-yellow: #facc15; --hp-red: #f87171;
  --normal:#A8A878; --fire:#F08030; --water:#6890F0; --grass:#78C850;
  --electric:#F8D030; --ice:#98D8D8; --fighting:#C03028; --poison:#A040A0;
  --ground:#E0C068; --flying:#A890F0; --psychic:#F85888; --bug:#A8B820;
  --rock:#B8A038; --ghost:#705898; --dragon:#7038F8; --dark:#705848;
  --steel:#B8B8D0; --fairy:#EE99AC;
}

*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}

body{font-family:'Press Start 2P',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999;}

#arena-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.particle{position:absolute;border-radius:50%;animation:drift linear infinite;opacity:0;}
@keyframes drift{0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:0.6;}100%{transform:translateY(-10vh) translateX(var(--dx,20px)) scale(1.5);opacity:0;}}

.screen{display:none;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;min-height:100vh;}

/* ===== AUTH SCREEN ===== */
#auth-screen{justify-content:center;align-items:center;padding:2rem;position:relative;}
.auth-container{position:relative;z-index:2;max-width:450px;width:100%;background:var(--panel);border:2px solid var(--border);border-radius:20px;padding:2.5rem;box-shadow:0 0 40px rgba(233,69,96,0.15);}
.auth-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:2px solid var(--border);}
.auth-tab{flex:1;background:none;border:none;color:var(--dim);font-family:inherit;font-size:0.6rem;padding:12px;cursor:pointer;transition:all 0.3s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.auth-tab:hover{color:var(--text);}
.auth-form{display:none;}
.auth-form.active{display:block;}
.auth-input-group{margin-bottom:1.5rem;}
.auth-label{display:block;font-size:0.45rem;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.auth-input{width:100%;background:var(--panel2);border:2px solid var(--border);color:var(--text);padding:14px 16px;font-family:inherit;font-size:0.55rem;border-radius:10px;transition:all 0.3s;}
.auth-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px rgba(233,69,96,0.2);}
.auth-input::placeholder{color:#445566;}
.btn-auth-submit{width:100%;background:linear-gradient(135deg, var(--accent), var(--accent2));color:white;border:none;padding:16px;font-family:inherit;font-size:0.6rem;cursor:pointer;border-radius:10px;box-shadow:0 4px 20px rgba(233,69,96,0.4);transition:all 0.3s;margin-top:0.5rem;}
.btn-auth-submit:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(233,69,96,0.6);}
.auth-divider{text-align:center;margin:1.5rem 0;position:relative;}
.auth-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
.auth-divider span{position:relative;background:var(--panel);padding:0 12px;font-size:0.4rem;color:var(--dim);}
.btn-guest{background:var(--panel2);border:2px solid var(--border);color:var(--dim);padding:12px;font-family:inherit;font-size:0.5rem;cursor:pointer;border-radius:10px;width:100%;transition:all 0.3s;}
.btn-guest:hover{border-color:var(--blue);color:var(--text);}
.auth-error{color:var(--accent);font-size:0.45rem;margin-top:8px;display:none;}
.auth-error.show{display:block;}

/* User Badge */
.user-badge{position:fixed;top:1rem;right:1rem;z-index:100;display:none;align-items:center;gap:10px;background:var(--panel);border:2px solid var(--border);border-radius:12px;padding:8px 16px;}
.user-badge.show{display:flex;}
.user-badge .user-info{display:flex;flex-direction:column;}
.user-badge .user-name{font-size:0.5rem;color:var(--text);}
.user-badge .user-score{font-size:0.4rem;color:var(--gold);}
.btn-logout{background:none;border:none;color:var(--dim);font-size:0.6rem;cursor:pointer;padding:4px;transition:all 0.3s;}
.btn-logout:hover{color:var(--accent);}

/* ===== HERO SCREEN ===== */
#hero-screen{justify-content:center;align-items:center;text-align:center;padding:2rem;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center, #1a1a4e 0%, #0a0a1a 70%);z-index:-1;}
.hero-overlay{position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="rgba(255,255,255,0.1)"/></svg>');background-size:50px 50px;opacity:0.3;z-index:-1;}
.hero-floating-pokemon{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.hero-floating-pokemon img{position:absolute;width:80px;height:80px;object-fit:contain;image-rendering:pixelated;opacity:0.25;animation:floatPokemon linear infinite;}
@keyframes floatPokemon{0%{transform:translateY(110vh) rotate(0deg);opacity:0;}10%{opacity:0.3;}90%{opacity:0.3;}100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}}
.hero-content{position:relative;z-index:2;max-width:600px;width:100%;}
.hero-solana-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(20,241,149,0.1);border:1px solid rgba(20,241,149,0.3);color:#14f195;padding:8px 16px;border-radius:20px;font-size:0.5rem;margin-bottom:2rem;}
.hero-sol-dot{width:8px;height:8px;background:#14f195;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.hero-char-wrap{position:relative;width:150px;height:150px;margin:0 auto 2rem;}
.hero-char-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 20px rgba(168,85,247,0.6));animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.hero-char-glow{position:absolute;inset:-30px;background:radial-gradient(circle, rgba(168,85,247,0.4) 0%, rgba(233,69,96,0.2) 50%, transparent 70%);z-index:-1;animation:glowPulse 3s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:1;transform:scale(1.1);}}
.hero-eyebrow{color:var(--accent2);font-size:0.6rem;margin-bottom:0.5rem;letter-spacing:3px;}
.hero-title-main{font-size:2.2rem;color:var(--gold);text-shadow:0 0 30px rgba(245,166,35,0.5);margin-bottom:0.3rem;}
.hero-title-sub{font-size:1.2rem;color:var(--accent);margin-bottom:1.5rem;letter-spacing:5px;}
.hero-tagline{color:var(--dim);font-size:0.55rem;line-height:1.8;margin-bottom:2rem;}
.btn-hero-primary{background:linear-gradient(135deg, var(--accent), var(--accent2));color:white;border:none;padding:18px 50px;font-family:inherit;font-size:0.75rem;cursor:pointer;border-radius:12px;box-shadow:0 4px 25px rgba(233,69,96,0.5), 0 0 50px rgba(233,69,96,0.2);transition:all 0.3s;text-transform:uppercase;letter-spacing:2px;}
.btn-hero-primary:hover{transform:translateY(-3px);box-shadow:0 8px 35px rgba(233,69,96,0.7), 0 0 70px rgba(233,69,96,0.3);}

/* ===== LOADING SCREEN ===== */
#loading-screen{justify-content:center;align-items:center;flex-direction:column;gap:2rem;padding:2rem;}
.loading-poke{width:120px;height:120px;image-rendering:pixelated;animation:bounce 1s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
.loading-text{font-size:0.8rem;color:var(--text);}
.loading-bar-bg{width:300px;height:12px;background:var(--panel);border-radius:6px;overflow:hidden;border:2px solid var(--border);}
.loading-bar-fill{height:100%;background:linear-gradient(90deg, var(--accent), var(--accent2));border-radius:4px;transition:width 0.3s;}

/* ===== HOME SCREEN ===== */
#home-screen{padding:2rem;align-items:center;}
.home-header{text-align:center;margin-bottom:2rem;}
.home-title{font-size:1.2rem;color:var(--gold);margin-bottom:0.5rem;}
.home-subtitle{font-size:0.5rem;color:var(--dim);}
.home-nav{display:flex;gap:1rem;margin-bottom:2rem;}
.btn-nav{background:var(--panel2);border:2px solid var(--border);color:var(--text);padding:10px 20px;font-family:inherit;font-size:0.5rem;cursor:pointer;border-radius:8px;transition:all 0.3s;}
.btn-nav:hover{border-color:var(--gold);color:var(--gold);}
.selection-counter{text-align:center;font-size:0.6rem;color:var(--dim);margin-bottom:1rem;padding:10px;background:var(--panel2);border:2px solid var(--border);border-radius:10px;min-width:200px;transition:all 0.3s;}
.selection-counter.complete{color:var(--green);border-color:var(--green);box-shadow:0 0 15px rgba(0,230,118,0.2);}
.btn-play{background:linear-gradient(135deg, var(--accent), var(--accent2));color:white;border:none;padding:20px 50px;font-family:inherit;font-size:0.8rem;cursor:pointer;border-radius:12px;box-shadow:0 4px 25px rgba(233,69,96,0.4);margin-bottom:2rem;transition:all 0.3s;}
.btn-play:hover{transform:scale(1.05);}
.party-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:1rem;margin-bottom:2rem;max-width:600px;width:100%;}
.party-card{background:var(--panel);border:2px solid var(--border);border-radius:12px;padding:1rem;text-align:center;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.party-card:hover{border-color:var(--accent);transform:translateY(-3px);}
.party-card.selected{border-color:var(--gold);box-shadow:0 0 15px rgba(245,166,35,0.3);}
.party-card img{width:80px;height:80px;object-fit:contain;}
.party-card .name{font-size:0.45rem;margin-top:0.5rem;text-transform:capitalize;color:var(--text);}
.party-card .type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.35rem;margin-top:4px;color:white;}

/* ===== LEADERBOARD SCREEN ===== */
#leaderboard-screen{padding:2rem;align-items:center;}
.lb-header{text-align:center;margin-bottom:2rem;}
.lb-title{font-size:1.2rem;color:var(--gold);margin-bottom:0.5rem;}
.lb-subtitle{font-size:0.5rem;color:var(--dim);}
.lb-container{max-width:600px;width:100%;background:var(--panel);border:2px solid var(--border);border-radius:16px;overflow:hidden;}
.lb-tabs{display:flex;border-bottom:2px solid var(--border);}
.lb-tab{flex:1;background:none;border:none;color:var(--dim);font-family:inherit;font-size:0.55rem;padding:14px;cursor:pointer;transition:all 0.3s;}
.lb-tab.active{color:var(--gold);background:rgba(245,166,35,0.1);}
.lb-tab:hover{color:var(--text);}
.lb-list{padding:1rem;max-height:500px;overflow-y:auto;}
.lb-item{display:flex;align-items:center;gap:1rem;padding:12px;border-bottom:1px solid var(--border);transition:all 0.3s;}
.lb-item:hover{background:rgba(255,255,255,0.03);}
.lb-rank{width:40px;text-align:center;font-size:0.8rem;color:var(--gold);font-weight:bold;}
.lb-rank.top-1{color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,0.5);}
.lb-rank.top-2{color:#C0C0C0;text-shadow:0 0 10px rgba(192,192,192,0.5);}
.lb-rank.top-3{color:#CD7F32;text-shadow:0 0 10px rgba(205,127,50,0.5);}
.lb-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.lb-info{flex:1;}
.lb-username{font-size:0.55rem;color:var(--text);text-transform:capitalize;}
.lb-wins{font-size:0.4rem;color:var(--dim);margin-top:2px;}
.lb-score{font-size:0.6rem;color:var(--green);font-weight:bold;}
.lb-empty{text-align:center;padding:3rem;color:var(--dim);font-size:0.5rem;}
.btn-back{background:var(--panel2);border:2px solid var(--border);color:var(--text);padding:12px 30px;font-family:inherit;font-size:0.55rem;cursor:pointer;border-radius:10px;margin-top:1.5rem;transition:all 0.3s;}
.btn-back:hover{border-color:var(--accent);}
.btn-lb-toggle{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg, var(--gold), #ff8c00);border:none;color:white;font-family:inherit;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 20px rgba(245,166,35,0.4);transition:all 0.3s;display:flex;align-items:center;justify-content:center;}
.btn-lb-toggle:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(245,166,35,0.6);}

/* ===== BATTLE SCREEN ===== */
#battle-screen{flex-direction:column;padding:1rem;}
.battle-arena{flex:1;display:flex;flex-direction:column;justify-content:space-between;max-width:900px;width:100%;margin:0 auto;}
.battle-field{display:flex;justify-content:space-between;align-items:flex-end;padding:2rem 1rem;min-height:300px;position:relative;}
.battle-bg{position:absolute;inset:0;background:linear-gradient(180deg, #1a1a4e 0%, #0d0d22 50%, #1a0a1a 100%);border-radius:16px;z-index:-1;border:2px solid var(--border);}
.battle-bg::before{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg, transparent, rgba(0,0,0,0.5));border-radius:0 0 14px 14px;}

.pokemon-slot{display:flex;flex-direction:column;align-items:center;gap:0.5rem;position:relative;}
.pokemon-slot.enemy{align-items:flex-start;}
.pokemon-slot.player{align-items:flex-end;}
.pokemon-info{background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:8px;border:1px solid var(--border);min-width:140px;}
.pokemon-name{font-size:0.5rem;text-transform:capitalize;margin-bottom:4px;color:var(--text);}
.pokemon-lvl{font-size:0.4rem;color:var(--dim);}
.hp-bar-bg{width:100%;height:8px;background:#333;border-radius:4px;overflow:hidden;margin-top:4px;border:1px solid #555;}
.hp-bar-fill{height:100%;background:var(--hp-green);border-radius:3px;transition:all 0.5s;}
.hp-bar-fill.yellow{background:var(--hp-yellow);}
.hp-bar-fill.red{background:var(--hp-red);}
.hp-text{font-size:0.35rem;color:var(--dim);margin-top:2px;text-align:right;}
.pokemon-sprite{width:120px;height:120px;image-rendering:pixelated;transition:all 0.3s;}
.pokemon-sprite.hit{animation:shake 0.5s;}
.pokemon-sprite.attack{animation:attackLunge 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
@keyframes attackLunge{0%{transform:translateX(0) scaleX(-1);}50%{transform:translateX(30px) scaleX(-1);}100%{transform:translateX(0) scaleX(-1);}}
@keyframes attackLungeEnemy{0%{transform:translateX(0) scaleX(-1);}50%{transform:translateX(-30px) scaleX(-1);}100%{transform:translateX(0) scaleX(-1);}}
.pokemon-sprite.player-sprite{transform:scaleX(-1);}
.pokemon-sprite.enemy-sprite{transform:scaleX(-1);}
.pokemon-sprite.enemy-sprite.attack{animation:attackLungeEnemy 0.4s;}

/* Battle Controls */
.battle-controls{background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:1.5rem;margin-top:1rem;}
.battle-log{height:80px;overflow-y:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin-bottom:1rem;font-size:0.45rem;line-height:1.6;border:1px solid var(--border);}
.battle-log .log-entry{margin-bottom:4px;}
.battle-log .log-sys{color:var(--gold);}
.battle-log .log-damage{color:var(--accent);}
.battle-log .log-heal{color:var(--green);}
.moves-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:0.75rem;margin-bottom:1rem;}
.move-btn{background:var(--panel2);border:2px solid var(--border);color:var(--text);padding:12px;font-family:inherit;font-size:0.5rem;cursor:pointer;border-radius:8px;transition:all 0.2s;text-align:left;position:relative;overflow:hidden;}
.move-btn:hover:not(:disabled){border-color:var(--accent);background:var(--panel);transform:translateY(-2px);}
.move-btn:disabled{opacity:0.5;cursor:not-allowed;}
.move-btn .move-name{display:block;font-size:0.55rem;margin-bottom:4px;text-transform:capitalize;}
.move-btn .move-info{display:flex;justify-content:space-between;font-size:0.35rem;color:var(--dim);}
.move-btn .move-type{padding:1px 6px;border-radius:3px;color:white;font-size:0.3rem;}
.action-row{display:flex;gap:0.75rem;}
.action-btn{flex:1;background:var(--panel2);border:2px solid var(--border);color:var(--text);padding:12px;font-family:inherit;font-size:0.5rem;cursor:pointer;border-radius:8px;transition:all 0.2s;}
.action-btn:hover{border-color:var(--blue);background:var(--panel);}
.action-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* Party selector */
.party-selector{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center;padding:2rem;}
.party-selector.active{display:flex;}
.party-selector-content{background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:2rem;max-width:500px;width:100%;position:relative;}
.party-selector-title{text-align:center;font-size:0.7rem;margin-bottom:1.5rem;color:var(--gold);}
.party-selector-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:1rem;}
.switch-card{background:var(--panel2);border:2px solid var(--border);border-radius:12px;padding:1rem;text-align:center;cursor:pointer;transition:all 0.3s;}
.switch-card:hover{border-color:var(--blue);}
.switch-card.fainted{opacity:0.4;cursor:not-allowed;}
.switch-card img{width:60px;height:60px;object-fit:contain;}
.switch-card .name{font-size:0.4rem;margin-top:0.5rem;text-transform:capitalize;}
.switch-card .hp-text{font-size:0.3rem;color:var(--dim);margin-top:4px;}
.close-selector{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--dim);font-size:1rem;cursor:pointer;}

/* Damage popup */
.damage-popup{position:absolute;font-size:1rem;font-weight:bold;color:var(--accent);text-shadow:0 0 10px rgba(233,69,96,0.8);animation:damageFloat 1s forwards;pointer-events:none;z-index:50;}
@keyframes damageFloat{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-50px) scale(1.5);}}

/* Type effectiveness */
.effectiveness-text{position:absolute;font-size:0.5rem;color:var(--gold);text-shadow:0 0 5px rgba(245,166,35,0.5);animation:effectFloat 1.5s forwards;pointer-events:none;z-index:50;white-space:nowrap;}
@keyframes effectFloat{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-30px);}}

/* Turn indicator */
.turn-indicator{text-align:center;padding:8px;font-size:0.5rem;color:var(--dim);margin-bottom:0.5rem;}
.turn-indicator.active{color:var(--green);}

/* ===== ATTACK EFFECTS ===== */
.attack-effect {position:absolute;pointer-events:none;z-index:60;display:none;}
.attack-effect.active {display:block;}

/* Fire */
.fireball {width:60px;height:60px;background:radial-gradient(circle, #ff6b35 20%, #ff4500 50%, #ff2200 80%, transparent 100%);border-radius:50%;box-shadow:0 0 30px #ff4500, 0 0 60px #ff2200, inset 0 0 20px #ffaa00;animation:fireballFly 0.6s ease-out forwards;}
.fireball::before {content:'';position:absolute;inset:-10px;background:radial-gradient(circle, transparent 30%, rgba(255,100,0,0.3) 70%);border-radius:50%;animation:firePulse 0.2s infinite;}
.fireball::after {content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:30px;height:40px;background:linear-gradient(to top, #ff4500, transparent);border-radius:50% 50% 20% 20%;filter:blur(3px);}
@keyframes fireballFly {0%{transform:scale(0.3) translateX(0);opacity:0;}20%{opacity:1;transform:scale(1) translateX(0);}100%{transform:scale(1.5) translateX(var(--fly-distance, -200px));opacity:0;}}
@keyframes firePulse {0%,100%{transform:scale(1);opacity:0.8;}50%{transform:scale(1.2);opacity:1;}}

/* Water */
.water-blast {width:50px;height:50px;background:radial-gradient(circle, #4fc3f7 20%, #0288d1 50%, #01579b 80%, transparent 100%);border-radius:50%;box-shadow:0 0 25px #0288d1, 0 0 50px #01579b;animation:waterFly 0.6s ease-out forwards;}
.water-blast::before {content:'';position:absolute;inset:-5px;border:3px solid rgba(79,195,247,0.5);border-ra
